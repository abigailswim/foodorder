];

// ── State ──
const qty = {};

function allItems() { return categories.flatMap(c => c.items); }
function getItem(code) { return allItems().find(i => i.code === code); }

function fmt(n) {
  return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function fmtQty(item, q) {
  const u = item.unit;
  const val = q % 1 === 0 ? q.toString() : q.toString();
  return val + ' ' + u;
}
function per100g(item) {
  if (!item.gramsPerUnit) return null;
  return (item.unitPrice / item.gramsPerUnit) * 100;
}

// ── Render ──
function render() {
  const container = document.getElementById('items-container');
  container.innerHTML = '';

  categories.forEach(cat => {
    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.textContent = cat.label;
    container.appendChild(hdr);

    cat.items.forEach(item => {
      if (qty[item.code] === undefined) qty[item.code] = 0;

      const card = document.createElement('div');
      card.className = 'item-card';

      const p100 = per100g(item);
      const p100str = p100 !== null
        ? `<span class="price-sep">·</span><span class="price-100g">$${fmt(p100)}/100g</span>`
        : '';
      const unitLabel = '/' + item.unit;

      card.innerHTML = `
        <div class="item-info">
          <div class="item-name-cn">${item.nameCN}</div>
          <div class="item-name-en">${item.nameEN}</div>
          <div class="item-code">${item.code}</div>
          <div class="item-pricing">
            <strong>HKD $${item.unitPrice % 1 === 0 ? item.unitPrice : item.unitPrice.toFixed(2)}${unitLabel}</strong>
            ${p100str}
          </div>
          <div class="item-stock">In order: ${fmtQty(item, item.totalOrdered)} &nbsp;·&nbsp; ${item.note}</div>
        </div>
        <div class="qty-control">
          <div class="qty-buttons">
            <button class="qty-btn" onclick="changeQty('${item.code}', -1)">−</button>
            <div class="qty-display" id="qty-${item.code}">${fmtQty(item, 0)}</div>
            <button class="qty-btn" onclick="changeQty('${item.code}', 1)">+</button>
          </div>
          <div class="item-subtotal zero" id="sub-${item.code}">$0.00</div>
        </div>
      `;
      container.appendChild(card);
    });
  });

  updateTotals();
}

function changeQty(code, dir) {
  const item = getItem(code);
  const next = (qty[code] || 0) + dir * item.step;
  qty[code] = Math.min(item.totalOrdered, Math.max(0, Math.round(next * 100) / 100));
  updateItem(code);
  updateGrandTotal();
}

function updateItem(code) {
  const item = getItem(code);
  const q = qty[code];
  const sub = q * item.unitPrice;
  const qEl = document.getElementById('qty-' + code);
  const sEl = document.getElementById('sub-' + code);
  if (!qEl || !sEl) return;
  qEl.textContent = fmtQty(item, q);
  if (sub > 0) {
    sEl.textContent = 'HKD $' + fmt(sub);
    sEl.classList.remove('zero');
  } else {
    sEl.textContent = '$0.00';
    sEl.classList.add('zero');
  }
}

function updateGrandTotal() {
  const total = allItems().reduce((s, i) => s + (qty[i.code] || 0) * i.unitPrice, 0);
  document.getElementById('grand-total').textContent = fmt(total);
}

function updateTotals() {
  allItems().forEach(i => updateItem(i.code));
  updateGrandTotal();
}

function resetAll() {
  allItems().forEach(i => { qty[i.code] = 0; });
  updateTotals();
}

// ── PDF via html2canvas (preserves Chinese fonts) ──
async function generatePDF() {
  const selected = allItems().filter(i => (qty[i.code] || 0) > 0);
  if (selected.length === 0) {
    alert('Please select at least one item.\n请先选择商品。');
    return;
  }

  const btn = document.getElementById('pdf-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';

  try {
    // Build print template HTML
    const grandTotal = selected.reduce((s, i) => s + qty[i.code] * i.unitPrice, 0);

    let rows = '';
    selected.forEach(item => {
      const q   = qty[item.code];
      const sub = q * item.unitPrice;
      const unitLabel = '/' + item.unit;
      rows += `
        <div class="pt-row">
          <div>
            <div class="pt-cn">${item.nameCN}</div>
            <div class="pt-en">${item.nameEN}</div>
            <div class="pt-code">${item.code}</div>
          </div>
          <div>$${item.unitPrice % 1 === 0 ? item.unitPrice : item.unitPrice.toFixed(2)}${unitLabel}</div>
          <div>${fmtQty(item, q)}</div>
          <div><strong>$${fmt(sub)}</strong></div>
        </div>`;
    });

    const tpl = document.getElementById('pdf-template');
    tpl.innerHTML = `
      <div class="pt-header">
        <h1>Order Share Summary &nbsp; 分单明细</h1>
        <div class="pt-sub">林先生 Mr. Lin</div>
        <div class="pt-meta">
          订单号 Ref: ${ORDER_REF} &nbsp;·&nbsp; ${ORDER_DATE} &nbsp;·&nbsp; BrightView Total: ${ORDER_TOTAL}
        </div>
      </div>
      <div class="pt-col-header">
        <div>Item 商品</div>
        <div>Unit Price 单价</div>
        <div>Qty 数量</div>
        <div>Subtotal 小计 (HKD)</div>
      </div>
      ${rows}
      <div class="pt-total-row">
        <div>TOTAL &nbsp; 合计</div>
        <div></div>
        <div></div>
        <div>HKD $${fmt(grandTotal)}</div>
      </div>
      <div class="pt-footer">
        Generated ${new Date().toLocaleString('en-HK')} &nbsp;·&nbsp; Prices in HKD, excl. VAT<br>
        Bright View Trading HK Ltd &nbsp;·&nbsp; CUST-03021 (ELLABOOK CLOUD TECHNOLOGY LIMITED)
      </div>
    `;

    tpl.style.display = 'block';

    const canvas = await html2canvas(tpl, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
    });

    tpl.style.display = 'none';

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const pageW = 210;
    const pageH = 297;
    const imgW  = pageW;
    const imgH  = canvas.height * imgW / canvas.width;
    const pageHeightPx = canvas.width * pageH / pageW;

    let yOffset = 0;
    let pageNum = 0;

    while (yOffset < canvas.height) {
      if (pageNum > 0) doc.addPage();

      const sliceH = Math.min(pageHeightPx, canvas.height - yOffset);
      const sliceCanvas = document.createElement('canvas');
      sliceCanvas.width  = canvas.width;
      sliceCanvas.height = sliceH;
      sliceCanvas.getContext('2d').drawImage(
        canvas, 0, yOffset, canvas.width, sliceH,
        0, 0, canvas.width, sliceH
      );
      const sliceHeightMM = sliceH * pageW / canvas.width;
      doc.addImage(sliceCanvas.toDataURL('image/png'), 'PNG', 0, 0, pageW, sliceHeightMM);

      yOffset += pageHeightPx;
      pageNum++;
    }

    doc.save('MrLin_OrderShare_' + ORDER_REF + '.pdf');

  } catch (err) {
    document.getElementById('pdf-template').style.display = 'none';
    console.error(err);
    alert('PDF generation failed.\nPDF生成失败，请重试。');
  } finally {
    btn.disabled = false;
    btn.textContent = '📄 Save PDF';
  }
}

// ── WeChat detection ──
function isWeChat() {
  return /MicroMessenger/i.test(navigator.userAgent);
}

function handleInvoiceClick(e) {
  if (isWeChat()) {
    e.preventDefault();
    document.getElementById('wechat-toast').classList.add('show');
  }
  // non-WeChat: opens in new tab normally
}

// ── Init ──
render();
</script>
