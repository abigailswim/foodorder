    /* ── Header ── */

    .item-stock {

    }

    /* ── Quantity control ── */
    .qty-control {

    }
    .qty-buttons {

      align-items: center;

      border-radius: 6px;
      overflow: hidden;
    }
    .qty-btn {
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      font-size: 1.2rem;
      font-weight: 300;
      cursor: pointer;
      color: #1a3a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }
    .qty-btn:hover { background: #e8f0ec; }
    .qty-btn:active { background: #c8dcd0; }
    .qty-display {
      min-width: 48px;
      text-align: center;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0 4px;
      line-height: 36px;
      color: #1a1a1a;
      border-left: 1.5px solid #1a3a2a;
      border-right: 1.5px solid #1a3a2a;
    }
    .item-subtotal {

      font-weight: 600;
      color: #1a3a2a;
      text-align: right;
      min-height: 18px;
    }
    .item-subtotal.zero { color: #ccc; font-weight: 400; }

    /* ── Sticky footer total ── */
    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a3a2a;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 -3px 20px rgba(0,0,0,0.15);
      z-index: 100;
    }
    .footer-total-label { font-size: 0.8rem; opacity: 0.8; }
    .footer-total-amount {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .footer-total-amount span { font-size: 0.9rem; font-weight: 400; margin-right: 2px; }
    .pdf-btn {
      background: #fff;
      color: #1a3a2a;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;

      white-space: nowrap;
    }
    .pdf-btn:hover { background: #e8f0ec; }
    .pdf-btn:active { transform: scale(0.97); }
    .pdf-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Empty state ── */
    .empty-note {
      text-align: center;
      padding: 40px 20px;

      font-size: 0.85rem;
    }

// ─────────────────────────────────────────────
// State: qty[code] = selected quantity
// ─────────────────────────────────────────────
const qty = {};

function allItems() {
  return categories.flatMap(c => c.items);
}

function getItem(code) {
  return allItems().find(i => i.code === code);
}

function fmt(n) {
  return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function fmtQty(item, q) {
  if (item.unit === 'kg') return q === Math.floor(q) ? q + ' kg' : q + ' kg';
  return q + ' ' + item.unit;
}

function per100g(item) {
  if (!item.gramsPerUnit) return null;
  const pricePerGram = item.unitPrice / item.gramsPerUnit;
  return pricePerGram * 100;
}

// ─────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────
function render() {
  const container = document.getElementById('items-container');
  container.innerHTML = '';

  categories.forEach(cat => {
    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.textContent = cat.label;
    container.appendChild(hdr);

    cat.items.forEach(item => {
      if (!qty[item.code]) qty[item.code] = 0;

      const card = document.createElement('div');
      card.className = 'item-card';
      card.id = 'card-' + item.code;

      const p100 = per100g(item);
      const p100str = p100 !== null ? `$${fmt(p100)}<span class="price-100g">/100g</span>` : '';
      const unitLabel = item.unit === 'kg' ? '/kg' : '/' + item.unit;

      card.innerHTML = `
        <div class="item-info">
          <div class="item-name-cn">${item.nameCN}</div>
          <div class="item-name-en">${item.nameEN}</div>
          <div class="item-code">${item.code}</div>
          <div class="item-pricing">
            <span><strong>HKD $${item.unitPrice}${unitLabel}</strong></span>
            ${p100str}
          </div>
          <div class="item-stock">Stock in order: ${fmtQty(item, item.totalOrdered)} &nbsp;·&nbsp; ${item.note}</div>
        </div>
        <div class="qty-control">
          <div class="qty-buttons">
            <button class="qty-btn" onclick="changeQty('${item.code}', -1)">−</button>
            <div class="qty-display" id="qty-${item.code}">${fmtQty(item, qty[item.code])}</div>
            <button class="qty-btn" onclick="changeQty('${item.code}', 1)">+</button>
          </div>
          <div class="item-subtotal zero" id="sub-${item.code}">$0.00</div>
        </div>
      `;
      container.appendChild(card);
    });
  });

  updateTotals();
}

function changeQty(code, dir) {
  const item = getItem(code);
  const current = qty[code] || 0;
  const next = current + dir * item.step;
  qty[code] = Math.min(item.totalOrdered, Math.max(0, Math.round(next * 10) / 10));
  updateItem(code);
  updateGrandTotal();
}

function updateItem(code) {
  const item = getItem(code);
  const q = qty[code];
  const sub = q * item.unitPrice;

  const qtyEl  = document.getElementById('qty-' + code);
  const subEl  = document.getElementById('sub-' + code);
  if (!qtyEl || !subEl) return;

  qtyEl.textContent = fmtQty(item, q);
  if (sub > 0) {
    subEl.textContent = 'HKD $' + fmt(sub);
    subEl.classList.remove('zero');
  } else {
    subEl.textContent = '$0.00';
    subEl.classList.add('zero');
  }
}

function updateGrandTotal() {
  const total = allItems().reduce((sum, item) => sum + (qty[item.code] || 0) * item.unitPrice, 0);
  document.getElementById('grand-total').textContent = fmt(total);
}

function updateTotals() {
  allItems().forEach(item => updateItem(item.code));
  updateGrandTotal();
}

function resetAll() {
  allItems().forEach(item => { qty[item.code] = 0; });
  updateTotals();
}

// ─────────────────────────────────────────────
// PDF Generation
// ─────────────────────────────────────────────
function generatePDF() {
  const selected = allItems().filter(i => (qty[i.code] || 0) > 0);
  if (selected.length === 0) {
    alert('Please select at least one item.\n请先选择商品。');
    return;
  }

  const btn = document.getElementById('pdf-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    const pageW = 210;
    const margin = 18;
    const col = pageW - margin * 2;
    let y = margin;

    // ── Header ──
    doc.setFillColor(26, 58, 42);
    doc.rect(0, 0, pageW, 36, 'F');

    doc.setTextColor(255, 255, 255);
    doc.setFontSize(16);
    doc.setFont('helvetica', 'bold');
    doc.text('Order Share Summary', margin, 16);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text('Ref: ' + ORDER_REF + '   |   ' + ORDER_DATE, margin, 24);
    doc.text('Mr. Lin / \u6797\u5148\u751f', margin, 30);

    y = 46;
    doc.setTextColor(26, 26, 26);

    // ── Column headers ──
    doc.setFillColor(232, 228, 220);
    doc.rect(margin, y - 5, col, 9, 'F');
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text('Item', margin + 1, y);
    doc.text('Unit Price', margin + 80, y, { align: 'right' });
    doc.text('Qty', margin + 110, y, { align: 'right' });
    doc.text('Subtotal (HKD)', margin + col, y, { align: 'right' });
    y += 8;

    // ── Items ──
    let grandTotal = 0;
    selected.forEach((item, idx) => {
      const q   = qty[item.code];
      const sub = q * item.unitPrice;
      grandTotal += sub;

      if (idx % 2 === 0) {
        doc.setFillColor(250, 250, 248);
        doc.rect(margin, y - 4, col, 14, 'F');
      }

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(26, 26, 26);

      // EN name (truncated)
      const enName = item.nameEN.length > 42 ? item.nameEN.slice(0, 42) + '…' : item.nameEN;
      doc.text(enName, margin + 1, y);

      // CN name (use unicode directly — basic CJK renders in helvetica as boxes, but it's the best we can do without embedding a font)
      doc.setFontSize(8);
      doc.setTextColor(80, 80, 80);
      doc.text(item.code + '  ' + item.nameCN, margin + 1, y + 4.5);

      // Price
      doc.setFontSize(9);
      doc.setTextColor(26, 26, 26);
      const unitLabel = item.unit === 'kg' ? '/kg' : '/' + item.unit;
      doc.text('$' + item.unitPrice + unitLabel, margin + 80, y, { align: 'right' });

      // Qty
      doc.text(fmtQty(item, q), margin + 110, y, { align: 'right' });

      // Subtotal
      doc.setFont('helvetica', 'bold');
      doc.text('$' + fmt(sub), margin + col, y, { align: 'right' });

      y += 14;

      // Page break
      if (y > 270 && idx < selected.length - 1) {
        doc.addPage();
        y = margin;
      }
    });

    // ── Divider ──
    doc.setDrawColor(26, 58, 42);
    doc.setLineWidth(0.5);
    doc.line(margin, y, margin + col, y);
    y += 7;

    // ── Grand total ──
    doc.setFillColor(26, 58, 42);
    doc.rect(margin, y - 5, col, 12, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(12);
    doc.setFont('helvetica', 'bold');
    doc.text('TOTAL', margin + 4, y + 2);
    doc.text('HKD $' + fmt(grandTotal), margin + col, y + 2, { align: 'right' });
    y += 18;

    // ── Footer note ──
    doc.setTextColor(120, 120, 120);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'normal');
    doc.text('Generated ' + new Date().toLocaleString('en-HK') + '  ·  Prices in HKD, excl. VAT', margin, y);
    doc.text('Bright View Trading HK Ltd  ·  CUST-03021 (ELLABOOK CLOUD TECHNOLOGY LIMITED)', margin, y + 5);

    doc.save('MrLin_OrderShare_' + ORDER_REF + '.pdf');
  } catch (err) {
    console.error(err);
    alert('PDF generation failed. Please try again.\nPDF生成失败，请重试。');
  } finally {
    btn.disabled = false;
    btn.textContent = '📄 Save PDF';
  }
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
render();
</script>
</body>
